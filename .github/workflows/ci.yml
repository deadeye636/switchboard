name: CI (tests)

# Cheap test gate to keep `main` green. Linux only (1x minute multiplier) — the
# multi-OS installer build lives in build.yml and runs only manually / on tag.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A test run reads the checkout and writes nothing. Without this block the job gets the repository's
# default token scope, which on a public repo is read-only but is a setting rather than a property of
# this workflow — a later change elsewhere would silently widen what a test run can do.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Node 22, not 20 — the test suite needs `node:sqlite` (added in 22.5).
      #
      # better-sqlite3 is compiled against ELECTRON's ABI (the postinstall rebuilds it for the app), so
      # it cannot be loaded by a plain `node --test` process at all. Every SQLite-backed test therefore
      # falls back to the built-in `node:sqlite` — which does not exist on Node 20. The Hermes suite was
      # red on this runner from the day it was written, for that reason and no other, and nobody could
      # see it because the fixture it wanted was missing too (#158).
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # node-gyp under Python 3.12 needs setuptools (distutils removed).
      - name: Install setuptools (node-gyp distutils fix)
        run: python -m pip install setuptools

      # Builds native modules (better-sqlite3, node-pty) + applies patch-package
      # via the postinstall hook, matching a local install.
      - name: Install dependencies
        run: npm ci

      # trigger-watcher.test.js uses real fs.watch/timers and takes ~5 min, so
      # give the whole suite a generous ceiling rather than letting the job's
      # default step handling cut it off.
      - name: Run tests
        run: npm test
        timeout-minutes: 15
