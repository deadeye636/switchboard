name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform to build'
        type: choice
        default: mac
        options: [all, mac, win, linux]

permissions:
  contents: write

jobs:
  # Build the job matrix dynamically. On manual dispatch we keep only the chosen
  # platform (or all); tag builds always get the full matrix. This runs in a
  # setup job because the `matrix` context is not available in a job-level `if`.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          PLATFORM: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform || 'all' }}
        shell: bash
        run: |
          # Full matrix. Linux is split per-arch to avoid electron-builder
          # bundling native modules from the wrong architecture. When multiple
          # targets (AppImage + deb) are built for multiple arches in one
          # invocation, the native module rebuild only runs between arch switches
          # for the first target type — the second target type reuses whatever
          # was last compiled, which can be the wrong arch. See doctly/switchboard#18.
          all='[
            {"os":"macos-14","platform":"mac"},
            {"os":"windows-2022","platform":"win"},
            {"os":"ubuntu-latest","platform":"linux","arch":"x64"},
            {"os":"ubuntu-24.04-arm","platform":"linux","arch":"arm64"}
          ]'
          if [ "$PLATFORM" = "all" ]; then
            m=$(echo "$all" | jq -c .)
          else
            m=$(echo "$all" | jq -c --arg p "$PLATFORM" '[.[] | select(.platform == $p)]')
          fi
          echo "matrix={\"include\":$m}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install setuptools (node-gyp distutils fix)
        run: python -m pip install setuptools

      - name: Install pacman build tooling (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Bundle CodeMirror
        run: npm run bundle:codemirror

      - name: Stamp build info
        run: node scripts/gen-build-info.js

      - name: Build
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.AppImage
            dist/*.deb
            dist/*.pacman
            dist/latest*.yml
          if-no-files-found: ignore

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --title "${GITHUB_REF_NAME#v}" \
            --notes "" \
            dist/*
